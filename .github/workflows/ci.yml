name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: yarn

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Install tooling
        run: yarn install --frozen-lockfile

      - name: Verify generated artifacts
        run: yarn verify-generated

      - name: Run Go tests
        run: go test ./...

      - name: Build module
        run: go build ./...
